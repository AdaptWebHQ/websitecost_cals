<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070c" />
      <stop offset="100%" stop-color="#0b0f19" />
    </linearGradient>
    
    <!-- Neon Amber/Orange Glow -->
    <radialGradient id="amberGlow" cx="80%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>
    
    <!-- Neon Blue/Purple Glow -->
    <radialGradient id="indigoGlow" cx="20%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>

    <!-- Card Background Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>
    
    <!-- Inner Card Ambient Gradients -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="1200" fill="url(#bgGrad)" />
  <rect width="800" height="1200" fill="url(#amberGlow)" />
  <rect width="800" height="1200" fill="url(#indigoGlow)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450 M 0,500 L 800,500 M 0,550 L 800,550 M 0,600 L 800,600 M 0,650 L 800,650 M 0,700 L 800,700 M 0,750 L 800,750 M 0,800 L 800,800 M 0,850 L 800,850 M 0,900 L 800,900 M 0,955 L 800,955 M 0,1000 L 800,1000 M 0,1050 L 800,1050 M 0,1100 L 800,1100 M 0,1150 L 800,1150" stroke="#ffffff" stroke-width="1" />
    <path d="M 50,0 L 50,1200 M 100,0 L 100,1200 M 150,0 L 150,1200 M 200,0 L 200,1200 M 250,0 L 250,1200 M 300,0 L 300,1200 M 350,0 L 350,1200 M 400,0 L 400,1200 M 450,0 L 450,1200 M 50,0 L 500,1200 M 550,0 L 550,1200 M 600,0 L 600,1200 M 650,0 L 650,1200 M 700,0 L 700,1200 M 750,0 L 750,1200" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- CONTENT CONTAINER -->
  <g transform="translate(60, 60)">
    
    <!-- Navbar -->
    <g>
      <text x="0" y="24" fill="#f59e0b" font-family="monospace" font-size="16" font-weight="900" letter-spacing="4">AC / STUDIO</text>
      <!-- Hiring Badge -->
      <rect x="520" y="8" width="160" height="24" rx="12" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="536" cy="20" r="4" fill="#10b981" />
      <text x="548" y="25" fill="#a7f3d0" font-family="sans-serif" font-size="9" font-weight="bold" letter-spacing="1">AVAILABLE FOR HIRE</text>
      <line x1="0" y1="48" x2="680" y2="48" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
    </g>

    <!-- Hero Title -->
    <g transform="translate(0, 100)">
      <!-- Badge -->
      <rect x="0" y="0" width="135" height="20" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
      <path d="M 12 6 L 14 10 L 18 10 L 15 13 L 16 17 L 12 15 L 8 17 L 9 13 L 6 10 L 10 10 Z" fill="#f59e0b" transform="translate(4, -2) scale(0.7)"/>
      <text x="24" y="13" fill="#fbbf24" font-family="sans-serif" font-size="8" font-weight="bold" letter-spacing="1.5">CREATIVE PORTFOLIO</text>

      <text x="0" y="60" fill="#ffffff" font-family="sans-serif" font-size="38" font-weight="900" letter-spacing="-1">ALEX CARTER</text>
      <text x="0" y="90" fill="#94a3b8" font-family="sans-serif" font-size="15" font-weight="500" letter-spacing="6">UX/UI DESIGN ARCHITECT</text>
      <text x="0" y="120" fill="#64748b" font-family="sans-serif" font-size="11" font-weight="400" width="400">
        Crafting award-winning bespoke websites, luxury interactive layouts, and high-performance digital experiences.
      </text>
    </g>

    <!-- Bento Grid (Start at Y: 300) -->
    <g transform="translate(0, 270)">
      
      <!-- Bento 1: Featured Project (Left) -->
      <g transform="translate(0, 0)" filter="url(#shadow)">
        <rect width="380" height="240" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
        <text x="20" y="30" fill="#64748b" font-family="sans-serif" font-size="9" font-weight="bold" letter-spacing="2">FEATURED WORK</text>
        
        <!-- Project Preview Box -->
        <rect x="20" y="50" width="340" height="130" rx="12" fill="#0d1321" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
        <!-- Glow accent inside box -->
        <circle cx="170" cy="115" r="70" fill="#6366f1" fill-opacity="0.15" filter="blur(20px)" />
        <text x="170" y="122" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="900" letter-spacing="4" text-anchor="middle">AURA v1.0</text>
        
        <text x="20" y="212" fill="#f8fafc" font-family="sans-serif" font-size="12" font-weight="bold">Luxury Dashboard Interface</text>
        <text x="310" y="212" fill="#64748b" font-family="sans-serif" font-size="9" font-weight="bold">DESIGN/DEV</text>
      </g>

      <!-- Bento 2: Expertise (Right) -->
      <g transform="translate(400, 0)">
        <rect width="280" height="240" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
        <text x="20" y="30" fill="#64748b" font-family="sans-serif" font-size="9" font-weight="bold" letter-spacing="2">CORE EXPERTISE</text>
        
        <!-- Skill 1 -->
        <g transform="translate(20, 60)">
          <rect width="240" height="36" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
          <circle cx="20" cy="18" r="4" fill="#f59e0b" />
          <text x="36" y="22" fill="#e2e8f0" font-family="sans-serif" font-size="10" font-weight="bold">UI/UX Strategy &amp; Systems</text>
        </g>
        <!-- Skill 2 -->
        <g transform="translate(20, 110)">
          <rect width="240" height="36" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
          <circle cx="20" cy="18" r="4" fill="#3b82f6" />
          <text x="36" y="22" fill="#e2e8f0" font-family="sans-serif" font-size="10" font-weight="bold">React / Next.js Development</text>
        </g>
        <!-- Skill 3 -->
        <g transform="translate(20, 160)">
          <rect width="240" height="36" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
          <circle cx="20" cy="18" r="4" fill="#10b981" />
          <text x="36" y="22" fill="#e2e8f0" font-family="sans-serif" font-size="10" font-weight="bold">Fluid Framer Animations</text>
        </g>
      </g>

      <!-- Bento 3: Quick Contact Card (Left Bottom) -->
      <g transform="translate(0, 260)">
        <rect width="320" height="150" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
        <text x="20" y="30" fill="#64748b" font-family="sans-serif" font-size="9" font-weight="bold" letter-spacing="2">VCARD CONNECTOR</text>
        
        <!-- Scan box -->
        <rect x="20" y="55" width="45" height="45" rx="8" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1"/>
        <!-- Mini QR Code lines representation -->
        <path d="M 30,65 L 35,65 L 35,70 L 30,70 Z M 45,65 L 55,65 L 55,75 M 30,80 L 30,90 L 40,90 M 45,85 L 55,85 L 55,90" stroke="#f59e0b" stroke-width="2.5" fill="none" />
        
        <text x="80" y="70" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold">Interactive sharing</text>
        <text x="80" y="90" fill="#64748b" font-family="sans-serif" font-size="9" font-weight="normal">One-tap contact sync module</text>

        <!-- CTA Button -->
        <rect x="20" y="115" width="280" height="24" rx="8" fill="url(#btnGrad)" />
        <text x="160" y="130" fill="#ffffff" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle" letter-spacing="1">SAVE CONTACT DETAILS</text>
      </g>

      <!-- Bento 4: Metrics / Socials (Right Bottom) -->
      <g transform="translate(340, 260)">
        <rect width="340" height="150" rx="20" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
        <text x="20" y="30" fill="#64748b" font-family="sans-serif" font-size="9" font-weight="bold" letter-spacing="2">SOCIAL CONNECTORS</text>
        
        <!-- Metric Grid -->
        <g transform="translate(20, 50)">
          <!-- Github -->
          <rect width="90" height="70" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
          <text x="45" y="30" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">GITHUB</text>
          <text x="45" y="52" fill="#64748b" font-family="sans-serif" font-size="8" font-weight="normal" text-anchor="middle">@alexcarter</text>
          
          <!-- Twitter -->
          <rect x="105" y="0" width="90" height="70" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
          <text x="150" y="30" fill="#3b82f6" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">TWITTER</text>
          <text x="150" y="52" fill="#64748b" font-family="sans-serif" font-size="8" font-weight="normal" text-anchor="middle">@alex_ux</text>

          <!-- Linkedin -->
          <rect x="210" y="0" width="90" height="70" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
          <text x="255" y="30" fill="#0077b5" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">LINKEDIN</text>
          <text x="255" y="52" fill="#64748b" font-family="sans-serif" font-size="8" font-weight="normal" text-anchor="middle">in/alexcarter</text>
        </g>
      </g>

    </g>

    <!-- Footer -->
    <g transform="translate(0, 1020)">
      <line x1="0" y1="0" x2="680" y2="0" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
      <text x="0" y="30" fill="#475569" font-family="monospace" font-size="8">© 2026 ALEX CARTER STUDIO. ALL RIGHTS RESERVED.</text>
      <text x="560" y="30" fill="#f59e0b" font-family="monospace" font-size="8" font-weight="bold">EXPLORE MORE →</text>
    </g>

  </g>
</svg>
